<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>坑你点钱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'SamsungOne',-apple-system,'Segoe UI',Roboto,sans-serif}
:root{--accent:#1888F2;--green:#00C853;--red:#FF3B30;--orange:#FF9500;--gold:#FFD700;--txt:#fff;--muted:#8A8A8A;--surface:#141414;--card:#1C1C1E;--card2:#222;--divider:rgba(255,255,255,.06);--navH:48px;--r28:28px;--r22:22px;--r16:16px;--pill:100px;--wall-bg:#000}
#device{width:100%;height:100%;max-width:430px;max-height:932px;margin:0 auto;position:relative;overflow:hidden;background:#000}
@media(min-width:500px){#device{border-radius:40px;border:5px solid #1a1a1a;margin-top:20px;height:calc(100% - 40px);box-shadow:0 0 0 1px #111,inset 0 0 60px rgba(0,0,0,.5)}}
#punch{display:none}@media(min-width:500px){#punch{display:block;position:absolute;top:10px;left:50%;transform:translateX(-50%);width:12px;height:12px;background:#000;border-radius:50%;z-index:999;box-shadow:0 0 0 2px #111}}
#sb{position:absolute;top:0;left:0;right:0;height:40px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:900;color:#fff;font-size:13px;font-weight:600}
.sb-r{display:flex;align-items:center;gap:5px;font-size:11px}
.sb-bat{display:flex;align-items:center;gap:2px}
.sb-bat-box{width:20px;height:10px;border:1.5px solid #fff;border-radius:3px;display:flex;align-items:center;padding:1px}
.sb-bat-fill{height:100%;background:var(--green);border-radius:1.5px;width:85%}
.sb-bat-tip{width:2px;height:5px;background:#fff;border-radius:0 2px 2px 0;margin-left:1px}
/* Samsung Navigation Bar */
#navbar{position:absolute;bottom:0;left:0;right:0;height:var(--navH);display:flex;align-items:center;justify-content:space-around;z-index:950;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--divider)}
.nav-btn{flex:1;height:100%;display:flex;align-items:center;justify-content:center;background:none;border:none;color:rgba(255,255,255,.65);cursor:pointer;transition:background .12s,transform .1s}
.nav-btn:active{background:rgba(255,255,255,.06);transform:scale(.82)}
.nav-btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* Samsung Home */
#home{position:absolute;top:0;left:0;right:0;bottom:0;padding-top:40px;padding-bottom:calc(var(--navH));display:flex;flex-direction:column;z-index:1;background:var(--wall-bg);overflow:hidden}
/* Samsung Widget */
.sw-widget{padding:24px 20px 12px;text-align:center;flex-shrink:0}
.sw-time{font-size:72px;font-weight:200;color:#fff;line-height:1;letter-spacing:-2px;font-variant-numeric:tabular-nums}
.sw-date{font-size:14px;color:var(--muted);margin-top:2px;font-weight:400}
.sw-weather{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:5px 14px;background:rgba(255,255,255,.06);border-radius:var(--pill);font-size:13px;color:rgba(255,255,255,.7)}
/* Samsung Search */
#search-wrap{padding:4px 20px 8px;flex-shrink:0}
#search{width:100%;height:42px;border:none;border-radius:var(--pill);background:rgba(255,255,255,.08);color:#fff;font-size:15px;padding:0 16px 0 40px;outline:none}
#search::placeholder{color:rgba(255,255,255,.35)}
.si{position:absolute;left:34px;top:16px;font-size:14px;pointer-events:none}
/* Samsung App Grid */
#grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:18px 0;padding:8px 16px;align-content:start;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
#grid::-webkit-scrollbar{display:none}
.ic{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.ic:active .ic-sq{transform:scale(.86);opacity:.7}
.ic-sq{width:54px;height:54px;border-radius:22%;display:flex;align-items:center;justify-content:center;font-size:26px;transition:transform .15s,opacity .15s;border:1px solid rgba(255,255,255,.05)}
.ic-lb{font-size:11px;color:rgba(255,255,255,.8);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;font-weight:400}
#dots{display:flex;justify-content:center;gap:5px;padding:6px 0;flex-shrink:0}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2)}.dot.a{background:var(--accent);width:16px;border-radius:3px}
/* Samsung Dock */
#dock{position:absolute;bottom:var(--navH);left:0;right:0;height:72px;display:flex;align-items:center;justify-content:center;gap:20px;padding:0 24px;background:linear-gradient(transparent,rgba(0,0,0,.85) 30%);z-index:2}
#dock .ic-sq{width:52px;height:52px}#dock .ic-lb{display:none}
/* Samsung App Container */
#av{position:absolute;top:0;left:0;right:0;bottom:var(--navH);z-index:800;display:none;background:var(--surface);overflow:hidden}
#av.open{display:flex;flex-direction:column;animation:samIn .28s cubic-bezier(.22,1,.36,1) forwards}
#av.close{display:flex;flex-direction:column;animation:samOut .22s ease forwards}
@keyframes samIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes samOut{to{opacity:0;transform:translateY(24px)}}
/* Samsung Header */
.ah{height:52px;display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0;position:relative;z-index:2;background:var(--surface)}
.ah-title{position:absolute;left:50%;transform:translateX(-50%);font-size:17px;font-weight:600;color:#fff;white-space:nowrap}
.ab{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--surface)}
.bb{background:none;border:none;color:var(--accent);font-size:28px;cursor:pointer;padding:4px 8px 4px 0;line-height:1;font-weight:300}
.bb:active{opacity:.5}
.ah-btn{background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer;padding:8px 12px;border-radius:var(--pill);font-weight:500}
.ah-btn:active{background:rgba(24,136,242,.12)}
/* Recent Apps */
#recent{position:absolute;top:0;left:0;right:0;bottom:var(--navH);z-index:900;display:none;background:rgba(0,0,0,.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);overflow-y:auto;-webkit-overflow-scrolling:touch}
#recent.show{display:block;animation:samIn .22s ease forwards}
#recent.show.closing{animation:samOut .18s ease forwards}
.rc-title{padding:52px 20px 12px;font-size:22px;font-weight:700;color:#fff}
.rc-list{padding:0 16px 20px;display:flex;flex-direction:column;gap:8px}
.rc-card{background:var(--card);border-radius:var(--r22);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.rc-card:active{background:rgba(255,255,255,.08)}
.rc-ci{width:40px;height:40px;border-radius:22%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.rc-cn{font-size:15px;font-weight:500;color:#fff}
.rc-empty{text-align:center;padding:80px 20px;color:var(--muted);font-size:15px}
.rc-clear{display:block;margin:0 auto 20px;padding:12px 28px;border:none;border-radius:var(--pill);background:rgba(255,255,255,.08);color:#fff;font-size:14px;font-weight:500;cursor:pointer}
.rc-clear:active{background:rgba(255,255,255,.12)}
/* ═══ Samsung Theme App ═══ */
.th-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 20px}
.th-preview{height:170px;border-radius:var(--r28);margin-bottom:16px;position:relative;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center}
.th-preview-inner{text-align:center;position:relative;z-index:2}
.th-preview-inner .tp-name{font-size:28px;font-weight:800;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.5);margin-bottom:4px}
.th-preview-inner .tp-sub{font-size:12px;color:rgba(255,255,255,.55);background:rgba(0,0,0,.35);padding:4px 14px;border-radius:var(--pill)}
.th-preview .tp-icons{position:absolute;bottom:14px;left:0;right:0;display:flex;justify-content:center;gap:10px}
.th-preview .tp-icon{width:34px;height:34px;border-radius:22%;background:rgba(255,255,255,.15);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-size:16px}
.th-section{font-size:12px;font-weight:600;color:var(--muted);margin:16px 0 10px;padding-left:4px;text-transform:uppercase;letter-spacing:.06em}
.th-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.th-wall{height:68px;border-radius:var(--r16);cursor:pointer;position:relative;overflow:hidden;transition:transform .15s,border-color .2s;border:2.5px solid transparent}
.th-wall.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 4px 16px rgba(24,136,242,.25)}
.th-wall:active{transform:scale(.95)}
.th-wall span{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:10px;color:rgba(255,255,255,.85);text-shadow:0 1px 4px rgba(0,0,0,.7);font-weight:500}
.th-wall.sel::after{content:'✓';position:absolute;top:4px;right:5px;font-size:10px;color:#fff;background:var(--accent);width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.th-colors{display:flex;gap:10px;flex-wrap:wrap;padding:2px 0}
.th-color{width:36px;height:36px;border-radius:50%;cursor:pointer;transition:transform .15s,border-color .2s;border:3px solid transparent;display:flex;align-items:center;justify-content:center}
.th-color.sel{border-color:#fff;transform:scale(1.15);box-shadow:0 0 14px rgba(255,255,255,.25)}
.th-color:active{transform:scale(.9)}
.th-color.sel::after{content:'✓';font-size:13px;color:#fff;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.th-apply{width:100%;padding:15px;border:none;border-radius:var(--pill);font-size:16px;font-weight:600;cursor:pointer;margin-top:18px;color:#fff;background:var(--accent);transition:filter .15s,transform .1s;box-shadow:0 4px 20px rgba(24,136,242,.35)}
.th-apply:active{filter:brightness(.85);transform:scale(.98)}
.th-random{width:100%;padding:12px;border:none;border-radius:var(--pill);font-size:13px;font-weight:500;cursor:pointer;margin-top:10px;color:var(--muted);background:rgba(255,255,255,.06)}
.th-random:active{background:rgba(255,255,255,.1)}
/* ═══ Samsung Game Shared ═══ */
.gm-wrap{flex:1;display:flex;flex-direction:column;background:#0a0a0a}
.gm-top{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;gap:8px}
.gm-sc{text-align:center}.gm-sc span{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}.gm-sc b{font-size:18px;color:#fff;font-weight:600}
.gm-btn{padding:6px 14px;border:none;border-radius:var(--pill);font-size:12px;font-weight:500;cursor:pointer;background:rgba(255,255,255,.08);color:#fff}
.gm-btn:active{background:rgba(255,255,255,.15)}
.gm-cv{flex:1;display:flex;align-items:center;justify-content:center;padding:6px;position:relative}
.gm-cv canvas{border-radius:var(--r22);background:#000;display:block}
.gm-ov{position:absolute;inset:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.75);border-radius:var(--r22);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:3;transition:opacity .3s}
.gm-ov.h{opacity:0;pointer-events:none}
.gm-ov h2{font-size:26px;color:#fff;margin:6px 0;font-weight:700}.gm-ov p{font-size:13px;color:var(--muted);margin-bottom:14px}
.gm-ov .big{font-size:42px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gm-play{width:52px;height:52px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:20px;cursor:pointer;box-shadow:0 4px 20px rgba(24,136,242,.4)}
.gm-play:active{transform:scale(.9)}
.gm-dpad{display:grid;grid-template-columns:repeat(3,48px);grid-template-rows:repeat(3,48px);gap:4px;padding:8px 0 12px;justify-content:center;flex-shrink:0}
.gd{border:none;border-radius:var(--r16);background:rgba(255,255,255,.08);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.gd:active{background:rgba(255,255,255,.18)}.gd.e{visibility:hidden}
.gm-f{padding:8px 16px;background:rgba(20,20,20,.8);border-top:1px solid var(--divider);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.gm-f span{font-size:11px;color:var(--muted)}
/* ═══ Samsung Recharge ═══ */
.rc-app{display:flex;flex-direction:column;height:100%;background:linear-gradient(180deg,#1a0a00,#0d0500 30%,#000)}
.rc-hero{padding:20px 20px 14px;text-align:center;overflow:hidden;flex-shrink:0;position:relative}
.rc-hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at center,rgba(255,185,0,.1),transparent 60%);animation:rcG 3s ease-in-out infinite alternate}
@keyframes rcG{from{opacity:.3}to{opacity:1}}
.rc-vip{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:var(--pill);font-size:11px;font-weight:700;margin-bottom:8px}
.rc-vip.l0{background:rgba(255,255,255,.08);color:rgba(255,255,255,.4)}.rc-vip.l1{background:linear-gradient(135deg,#cd7f32,#b8860b);color:#fff}.rc-vip.l2{background:linear-gradient(135deg,#c0c0c0,#a8a8a8);color:#fff}.rc-vip.l3{background:linear-gradient(135deg,#ffd700,#daa520);color:#000}.rc-vip.l4{background:linear-gradient(135deg,#e8e8e8,#fff,#e8e8e8);color:#000;box-shadow:0 0 16px rgba(255,215,0,.4)}.rc-vip.l5{background:linear-gradient(135deg,#ff0040,#ff6b00,#ffd700);color:#fff;animation:vipS 1.5s ease-in-out infinite}
@keyframes vipS{50%{filter:brightness(1.3)}}
.rc-bal-label{font-size:11px;color:rgba(255,215,0,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.rc-bal-val{font-size:38px;font-weight:800;background:linear-gradient(135deg,#ffd700,#ffaa00,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.rc-bal-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:4px}
.rc-stats{display:flex;justify-content:center;gap:24px;margin-top:12px}
.rc-stat{text-align:center}.rc-stat span{display:block;font-size:10px;color:var(--muted);text-transform:uppercase}.rc-stat b{font-size:14px;color:#fff;font-weight:600}
.rc-grid{flex:1;overflow-y:auto;padding:0 12px 12px;-webkit-overflow-scrolling:touch}
.rc-sec{margin-bottom:14px}.rc-st{font-size:11px;font-weight:600;color:var(--muted);padding:8px 4px;text-transform:uppercase;letter-spacing:.04em}
.rc-pkg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.rc-item{position:relative;border-radius:var(--r22);padding:14px 6px;text-align:center;cursor:pointer;overflow:hidden}.rc-item:active{transform:scale(.93);transition:transform .1s}
.rc-item .ri-a{font-size:16px;font-weight:800;color:#fff;line-height:1.1}.rc-item .ri-c{font-size:10px;color:rgba(255,255,255,.65);margin-top:3px}
.rc-item .ri-t{position:absolute;top:4px;right:4px;font-size:8px;font-weight:700;padding:2px 5px;border-radius:var(--pill);background:var(--red);color:#fff}
.rc-hot{background:linear-gradient(135deg,#ff6b35,#ff2d55)}.rc-gold{background:linear-gradient(135deg,#c9972e,#ffd700)}.rc-dia{background:linear-gradient(135deg,#6a5acd,#9370db)}.rc-myth{background:linear-gradient(135deg,#ff0040,#ff6b00,#ffd700)}.rc-sup{background:linear-gradient(135deg,#00c6ff,#0072ff,#7209b7)}.rc-inf{background:linear-gradient(135deg,#ff0844,#ffb199,#ffd700,#00e5ff,#00c6ff);background-size:300% 300%;animation:rcS 3s ease infinite}
@keyframes rcS{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.rc-big{margin:8px 12px 12px;padding:15px;border:none;border-radius:var(--pill);font-size:16px;font-weight:700;cursor:pointer;color:#000;background:linear-gradient(135deg,#ffd700,#ffaa00,#ffd700);background-size:200% 200%;animation:rcS 2s ease infinite;box-shadow:0 4px 20px rgba(255,185,0,.35)}.rc-big:active{transform:scale(.97)}
.rc-log{padding:0 12px 12px}.rc-lt{font-size:10px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase}
.rc-ll{max-height:60px;overflow-y:auto;font-size:10px;color:rgba(255,215,0,.6);line-height:1.5}.rc-ll::-webkit-scrollbar{display:none}
.confetti{position:fixed;pointer-events:none;z-index:99999}
.cp{position:absolute;width:7px;height:7px;border-radius:2px;animation:cf linear forwards}
@keyframes cf{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
.rc-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:900;color:var(--gold);text-shadow:0 0 30px rgba(255,215,0,.8);pointer-events:none;z-index:99999;animation:rp .8s ease forwards;white-space:nowrap}
@keyframes rp{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}30%{transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-100%) scale(.8)}}
/* ═══ Samsung Shared Styles ═══ */
.calc{display:flex;flex-direction:column;height:100%;background:#000}
.calc-d{text-align:right;padding:18px 20px 8px;display:flex;flex-direction:column;justify-content:flex-end;min-height:80px}
.calc-expr{font-size:14px;color:var(--muted);min-height:16px}.calc-v{font-size:48px;font-weight:300;color:#fff;line-height:1.1;word-break:break-all}
.calc-g{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;flex:1;padding:1px}
.cb{border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:filter .08s}.cb:active{filter:brightness(.65)}
.cb.fn{background:#a5a5a5;color:#000;font-size:16px;font-weight:500}.cb.op{background:var(--accent);color:#fff;font-size:22px}.cb.n{background:#333;color:#fff}.cb.z{grid-column:span 2;justify-content:flex-start;padding-left:24px}
.msg-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.msg-ct{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--divider)}.msg-ct:active{background:rgba(255,255,255,.04)}
.msg-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.msg-nfo{flex:1;min-width:0}.msg-nm{font-size:15px;font-weight:500;color:#fff}.msg-pr{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat{flex:1;display:flex;flex-direction:column}
.chat-h{height:52px;display:flex;align-items:center;padding:0 12px;border-bottom:1px solid var(--divider);flex-shrink:0;gap:8px}.chat-h span{font-size:16px;font-weight:600;color:#fff}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:6px;-webkit-overflow-scrolling:touch}
.bub{max-width:75%;padding:10px 14px;border-radius:var(--r22);font-size:14px;line-height:1.4;word-wrap:break-word;animation:bi .2s ease}
@keyframes bi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.bub.me{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.bub.them{align-self:flex-start;background:var(--card);color:#fff;border-bottom-left-radius:4px}
.chat-bar{display:flex;gap:8px;padding:8px 12px;border-top:1px solid var(--divider);flex-shrink:0}
.chat-bar input{flex:1;height:36px;border:none;border-radius:var(--pill);background:rgba(255,255,255,.08);color:#fff;font-size:14px;padding:0 16px;outline:none}
.chat-bar input:focus{box-shadow:0 0 0 2px var(--accent)}
.chat-bar button{height:36px;padding:0 18px;border:none;border-radius:var(--pill);background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0}
.music{display:flex;flex-direction:column;height:100%;background:#000}
.m-vis{height:100px;flex-shrink:0}.m-vis canvas{width:100%;height:100%;display:block}
.m-info{text-align:center;padding:12px 16px 4px}.m-info h3{font-size:16px;font-weight:600;color:#fff;margin-bottom:2px}.m-info p{font-size:13px;color:var(--muted)}

el.querySelectorAll('.th-color').forEach(function(c){c.onclick=function(){selAcc=c.dataset.c;render();};});
document.getElementById('thApply').onclick=function(){
document.documentElement.style.setProperty('--wall-bg',selBg);document.documentElement.style.setProperty('--accent',selAcc);
localStorage.setItem('theme',JSON.stringify({bg:selBg,accent:selAcc}));

setTimeout(function(){if(btn){btn.textContent='应用主题';btn.style.background='';}},1500);};

}render();};

apps.recharge=function(el){
var bal=parseFloat(localStorage.getItem('rb')||'0'),tot=parseFloat(localStorage.getItem('rt')||'0'),cnt=parseInt(localStorage.getItem('rc')||'0'),lg=JSON.parse(localStorage.getItem('rl')||'[]');
function gv(){if(tot>=1e8)return 5;if(tot>=1e7)return 4;if(tot>=1e6)return 3;if(tot>=1e5)return 2;if(tot>=1e4)return 1;return 0;}
function vn(l){return['普通用户','青铜VIP','白银VIP','黄金VIP','钻石VIP','至尊SVIP'][l];}
function fmt(n){if(n>=1e8)return(n/1e8).toFixed(2)+'亿';if(n>=1e4)return(n/1e4).toFixed(2)+'万';return n.toFixed(2);}

function conf(){var c=document.createElement('div');c.className='confetti';document.body.appendChild(c);var co=['#ffd700','#ff6b35','#ff2d55','#00c6ff','#30d158','#bf5af2'];for(var i=0;i<40;i++){var p=document.createElement('div');p.className='cp';p.style.left=Math.random()*100+'%';p.style.top='-10px';p.style.background=co[Math.floor(Math.random()*co.length)];p.style.width=(4+Math.random()*7)+'px';p.style.height=(4+Math.random()*7)+'px';p.style.animationDuration=(1+Math.random()*2)+'s';p.style.animationDelay=Math.random()*.5+'s';c.appendChild(p);}setTimeout(function(){c.remove();},3500);}

function charge(a){bal+=a;tot+=a;cnt++;var n=new Date();lg.unshift({a:a,t:String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')});sv();conf();pop(a);render();}

var gh='';pk.forEach(function(s){gh+='<div class="rc-sec"><div class="rc-st">'+s.s+'</div><div class="rc-pkg">';s.i.forEach(function(it){gh+='<div class="rc-item '+(it.x||s.c)+'" data-amt="'+it.a+'"><div class="ri-a">'+it.t+'</div><div class="ri-c">'+it.c+'</div>'+(it.g?'<span class="ri-t">'+it.g+'</span>':'')+'</div>';});gh+='</div></div>';});
var lh='';if(lg.length){lh='<div class="rc-log"><div class="rc-lt">充值记录</div><div class="rc-ll">';lg.slice(0,8).forEach(function(l){lh+='<div>['+l.t+'] ¥'+fmt(l.a)+'</div>';});lh+='</div></div>';}
el.innerHTML=mkH('充值中心',{bg:'transparent',c:'#FFD700'})+'<div class="ab"><div class="rc-app"><div class="rc-hero"><div class="rc-vip l'+v+'">👑 '+vn(v)+'</div><div><div class="rc-bal-label">账户余额</div><div class="rc-bal-val" id="rbv">¥'+fmt(bal)+'</div></div><div class="rc-bal-sub">累计 ¥'+fmt(tot)+' · '+cnt+'次</div><div class="rc-stats"><div class="rc-stat"><span>今日</span><b>¥'+fmt(tot)+'</b></div><div class="rc-stat"><span>VIP</span><b>Lv.'+v+'</b></div><div class="rc-stat"><span>次数</span><b>'+cnt+'</b></div></div></div><div class="rc-grid">'+gh+'</div><button class="rc-big" id="rcm">一键暴富</button>'+lh+'</div></div>';
el.querySelectorAll('[data-amt]').forEach(function(it){it.onclick=function(){charge(parseFloat(it.dataset.amt));};});
document.getElementById('rcm').onclick=function(){charge(99999+Math.floor(Math.random()*900000));};
};render();};

apps.shooter=function(el){
el.innerHTML=mkH('飞机大战')+'<div class="ab"><div class="gm-wrap"><div class="gm-top"><div class="gm-sc"><span>得分</span><b id="sh-s">0</b></div><div class="gm-sc"><span>生命</span><b id="sh-l">❤❤❤</b></div><div class="gm-sc"><span>波次</span><b id="sh-w">1</b></div></div><div class="gm-cv"><canvas id="shcv"></canvas><div class="gm-ov" id="sh-st"><h2>飞机大战</h2><p>滑动控制 · 自动射击</p><button class="gm-play" id="sh-go">▶</button></div><div class="gm-ov h" id="sh-ov"><h2>游戏结束</h2><div class="big" id="sh-fs">0</div><p id="sh-fh"></p><button class="gm-play" id="sh-rg">↺</button></div></div><div class="gm-f"><span>滑动屏幕控制</span><span id="sh-hi">最高: '+(localStorage.getItem('shi2')||0)+'</span></div></div></div>';
var cv=document.getElementById('shcv'),c=cv.getContext('2d'),W,H,P,bul,ens,pts,stars,sc,lv,rn,lp,tick,wv,hi=parseInt(localStorage.getItem('shi2')||'0');
function rz(){var p=cv.parentElement;W=p.clientWidth-12;H=p.clientHeight-12;cv.width=W;cv.height=H;}rz();
function init(){P={x:W/2,y:H-50};bul=[];ens=[];pts=[];stars=[];for(var i=0;i<40;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.5+.5,sp:Math.random()+.3});sc=0;lv=3;tick=0;wv=1;rn=false;}
function boom(x,y,col,n){for(var i=0;i<n;i++)pts.push({x:x,y:y,vx:(Math.random()-.5)*7,vy:(Math.random()-.5)*7,col:col,life:1});}
function hit(a,b,aw,bw){return Math.abs(a.x-b.x)<(aw+bw)/2&&Math.abs(a.y-b.y)<(aw+bw)/2;}
function spawn(){var ts=[{w:18,hp:1,sp:1.5,col:'#FF3B30',pt:10},{w:24,hp:2,sp:1,col:'#FF9100',pt:25},{w:30,hp:4,sp:.6,col:'#9C27B0',pt:50}];var t=ts[Math.floor(Math.random()*ts.length)];ens.push({x:Math.random()*(W-40)+20,y:-20,w:t.w,hp:t.hp,sp:t.sp+wv*.08,col:t.col,pt:t.pt});}
function update(){tick++;
if(tick%10===0)bul.push({x:P.x,y:P.y-18,sp:9});
for(var i=bul.length-1;i>=0;i--){bul[i].y-=bul[i].sp;if(bul[i].y<-10)bul.splice(i,1);}
var rate=Math.max(18,50-wv*3);if(tick%rate===0)spawn();if(tick%600===0){wv++;document.getElementById('sh-w').textContent=wv;}
for(var i=ens.length-1;i>=0;i--){var e=ens[i];e.y+=e.sp;e.x+=Math.sin(tick*.02+i)*.4;
if(e.y>H+30){ens.splice(i,1);continue;}
if(hit(e,P,e.w,24)){boom(P.x,P.y,'#1888F2',10);ens.splice(i,1);lv--;if(lv<=0){over();return;}continue;}
for(var j=bul.length-1;j>=0;j--){if(hit(e,bul[j],e.w,4)){e.hp--;bul.splice(j,1);if(e.hp<=0){sc+=e.pt;boom(e.x,e.y,e.col,8);ens.splice(i,1);}break;}}}
for(var i=pts.length-1;i>=0;i--){var p=pts[i];p.x+=p.vx;p.y+=p.vy;p.life-=.03;if(p.life<=0)pts.splice(i,1);}
stars.forEach(function(s){s.y+=s.sp;if(s.y>H){s.y=0;s.x=Math.random()*W;}});
document.getElementById('sh-s').textContent=sc;var h='';for(var i=0;i<lv;i++)h+='❤';document.getElementById('sh-l').textContent=h||'💀';}
function draw(){c.fillStyle='#0a0a14';c.fillRect(0,0,W,H);
c.fillStyle='rgba(255,255,255,.4)';stars.forEach(function(s){c.globalAlpha=.2+s.sp*.3;c.fillRect(s.x,s.y,s.s,s.s);});c.globalAlpha=1;
c.fillStyle='#1888F2';c.beginPath();c.moveTo(P.x,P.y-15);c.lineTo(P.x-13,P.y+13);c.lineTo(P.x+13,P.y+13);c.closePath();c.fill();
c.fillStyle='#42A5F5';c.beginPath();c.arc(P.x,P.y+2,3,0,Math.PI*2);c.fill();
c.fillStyle='#00C853';bul.forEach(function(b){c.fillRect(b.x-1.5,b.y-5,3,10);});
ens.forEach(function(e){c.fillStyle=e.col;c.beginPath();c.arc(e.x,e.y,e.w/2,0,Math.PI*2);c.fill();});
pts.forEach(function(p){c.globalAlpha=p.life;c.fillStyle=p.col;c.beginPath();c.arc(p.x,p.y,2,0,Math.PI*2);c.fill();});c.globalAlpha=1;}
function over(){rn=false;clearInterval(lp);if(sc>hi){hi=sc;localStorage.setItem('shi2',hi);document.getElementById('sh-hi').textContent='最高: '+hi;}document.getElementById('sh-fs').textContent=sc;document.getElementById('sh-fh').textContent='最高分: '+hi;document.getElementById('sh-ov').classList.remove('h');}
function start(){init();rn=true;document.getElementById('sh-st').classList.add('h');document.getElementById('sh-ov').classList.add('h');lp=setInterval(function(){if(!rn)return;update();draw();},1000/60);}
cv.addEventListener('touchmove',function(e){if(!rn)return;var r=cv.getBoundingClientRect();P.x=Math.max(16,Math.min(W-16,e.touches[0].clientX-r.left));e.preventDefault();},{passive:false});
cv.addEventListener('touchstart',function(e){if(!rn)return;var r=cv.getBoundingClientRect();P.x=Math.max(16,Math.min(W-16,e.touches[0].clientX-r.left));},{passive:true});
document.getElementById('sh-go').onclick=start;document.getElementById('sh-rg').onclick=function(){clearInterval(lp);start();};
init();draw();};

apps.contra=function(el){
el.innerHTML=mkH('魂斗罗')+'<div class="ab"><div class="gm-wrap"><div class="gm-top"><div class="gm-sc"><span>得分</span><b id="ct-s">0</b></div><div class="gm-sc"><span>生命</span><b id="ct-l">❤❤❤</b></div><button class="gm-btn" id="ct-pb">暂停</button></div><div class="gm-cv"><canvas id="ctcv"></canvas><div class="gm-ov" id="ct-st"><h2>魂斗罗</h2><p>方向键移动跳跃 · 自动射击</p><button class="gm-play" id="ct-go">▶</button></div><div class="gm-ov h" id="ct-ov"><h2>游戏结束</h2><div class="big" id="ct-fs">0</div><button class="gm-play" id="ct-rg">↺</button></div></div><div class="gm-dpad"><div class="gd e"></div><button class="gd" id="ct-ju">▲</button><div class="gd e"></div><button class="gd" id="ct-lt">◀</button><div class="gd e"></div><button class="gd" id="ct-rt">▶</button><div class="gd e"></div><div class="gd e"></div><div class="gd e"></div></div><div class="gm-f"><span>◀▶ 移动 ▲ 跳跃</span><span>自动射击</span></div></div></div>';
var cv=document.getElementById('ctcv'),c=cv.getContext('2d'),W,H,G=.5,JV=-9,PS=3;
function rz(){var p=cv.parentElement;W=p.clientWidth-12;H=p.clientHeight-12;cv.width=W;cv.height=H;}rz();
var pl,ens,buls,plats,cam,sc,lv,rn,lp,tick,keys={l:false,r:false,j:false};
function mkPlats(){var p=[],gy=H-30;p.push({x:0,y:gy,w:600,h:30});p.push({x:200,y:gy-70,w:100,h:12});p.push({x:400,y:gy-50,w:80,h:12});p.push({x:680,y:gy,w:500,h:30});p.push({x:750,y:gy-80,w:90,h:12});p.push({x:900,y:gy-50,w:100,h:12});p.push({x:1250,y:gy,w:600,h:30});p.push({x:1350,y:gy-70,w:80,h:12});p.push({x:1500,y:gy-100,w:100,h:12});p.push({x:1920,y:gy,w:800,h:30});p.push({x:2000,y:gy-80,w:100,h:12});p.push({x:2200,y:gy-60,w:80,h:12});return p;}
function mkEns(){var e=[];for(var i=0;i<20;i++)e.push({x:500+i*120+Math.random()*60,y:H-60,w:20,h:24,vx:(Math.random()>.5?1:-1)*(.5+Math.random()),hp:1});return e;}
function init(){pl={x:60,y:H-80,w:16,h:24,vx:0,vy:0,onG:false};ens=mkEns();buls=[];plats=mkPlats();cam={x:0};sc=0;lv=3;tick=0;rn=false;keys={l:false,r:false,j:false};}
function update(){tick++;pl.vx=0;if(keys.l)pl.vx=-PS;if(keys.r)pl.vx=PS;if(keys.j&&pl.onG){pl.vy=JV;pl.onG=false;}pl.vy+=G;pl.x+=pl.vx;pl.y+=pl.vy;pl.onG=false;plats.forEach(function(p){if(pl.vy>=0&&pl.x+pl.w>p.x&&pl.x<p.x+p.w&&pl.y+pl.h>=p.y&&pl.y+pl.h<=p.y+p.h+6){pl.y=p.y-pl.h;pl.vy=0;pl.onG=true;}});if(pl.y>H+50){lv--;if(lv<=0){over();return;}pl.x=cam.x+60;pl.y=H-80;pl.vy=0;}cam.x=Math.max(0,pl.x-W/3);if(tick%25===0)buls.push({x:pl.x+pl.w,y:pl.y+pl.h/2,vx:8});for(var i=buls.length-1;i>=0;i--){buls[i].x+=buls[i].vx;if(buls[i].x>cam.x+W+20)buls.splice(i,1);}ens.forEach(function(e){e.x+=e.vx;plats.forEach(function(p){if(e.x<=p.x||e.x+e.w>=p.x+p.w)e.vx*=-1;});for(var j=buls.length-1;j>=0;j--){if(Math.abs(buls[j].x-e.x-e.w/2)<14&&Math.abs(buls[j].y-e.y-e.h/2)<14){e.hp--;buls.splice(j,1);if(e.hp<=0){sc+=10;e.x=-999;}break;}}if(Math.abs(pl.x-e.x)<18&&Math.abs(pl.y-e.y)<20){lv--;if(lv<=0){over();return;}pl.x=cam.x+60;pl.y=H-80;pl.vy=0;}});document.getElementById('ct-s').textContent=sc;var h='';for(var i=0;i<lv;i++)h+='❤';document.getElementById('ct-l').textContent=h||'💀';}
function draw(){c.fillStyle='#1a2a1a';c.fillRect(0,0,W,H);c.fillStyle='#2d5016';plats.forEach(function(p){c.fillRect(p.x-cam.x,p.y,p.w,p.h);});c.fillStyle='#42A5F5';c.fillRect(pl.x-cam.x,pl.y,pl.w,pl.h);c.fillStyle='#fff';c.fillRect(pl.x-cam.x+pl.w,pl.y+6,6,3);c.fillStyle='#FFD700';buls.forEach(function(b){c.fillRect(b.x-cam.x-4,b.y-1.5,8,3);});ens.forEach(function(e){if(e.x<0)return;c.fillStyle='#EF5350';c.fillRect(e.x-cam.x,e.y,e.w,e.h);c.fillStyle='#FFD700';c.fillRect(e.x-cam.x+2,e.y+4,4,4);});}
function over(){rn=false;clearInterval(lp);document.getElementById('ct-fs').textContent=sc;document.getElementById('ct-ov').classList.remove('h');}
function start(){init();rn=true;document.getElementById('ct-st').classList.add('h');document.getElementById('ct-ov').classList.add('h');lp=setInterval(function(){if(!rn)return;update();draw();},1000/60);}

document.getElementById('ct-pb').onclick=function(){if(!rn)return;rn=false;clearInterval(lp);c.fillStyle='rgba(0,0,0,.4)';c.fillRect(0,0,W,H);c.fillStyle='#fff';c.font='600 20px -apple-system';c.textAlign='center';c.fillText('已暂停',W/2,H/2);};
function bind(id,k){var el2=document.getElementById(id);el2.ontouchstart=function(e){e.preventDefault();keys[k]=true;};el2.ontouchend=function(){keys[k]=false;};}
bind('ct-lt','l');bind('ct-rt','r');bind('ct-ju','j');
document.onkeydown=function(e){if(curApp!=='contra')return;if(e.key==='ArrowLeft'||e.key==='a'){e.preventDefault();keys.l=true;}if(e.key==='ArrowRight'||e.key==='d'){e.preventDefault();keys.r=true;}if(e.key==='ArrowUp'||e.key==='w'||e.key===' '){e.preventDefault();keys.j=true;}};
document.onkeyup=function(e){if(e.key==='ArrowLeft'||e.key==='a')keys.l=false;if(e.key==='ArrowRight'||e.key==='d')keys.r=false;if(e.key==='ArrowUp'||e.key==='w'||e.key===' ')keys.j=false;};
init();draw();};

var cv=document.getElementById('scv'),cx=cv.getContext('2d'),G=18,CO,RO,snake,food,dir,ndir,sc=0,hi=parseInt(localStorage.getItem('shi')||'0'),run=false,pa=false,lp,spd,bas=120;

else if(tab==='tmr'){var mins=5,rn2=false,left=0;b.innerHTML='<div class="tmr-sel"><button class="tmr-btn" id="tmd">−</button><div class="tmr-val" id="tmv">5:00</div><button class="tmr-btn" id="tmu">+</button></div><button class="tmr-go" id="tmgo">启动</button>';

function dC(){var cv=document.getElementById('clkcv');if(!cv)return;var c=cv.getContext('2d'),w=210,h=210,x=w/2,y=h/2,r=92;c.clearRect(0,0,w,h);c.strokeStyle='rgba(255,255,255,.15)';c.lineWidth=2;c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.stroke();for(var i=0;i<12;i++){var a=i*Math.PI/6-Math.PI/2;c.strokeStyle=i%3===0?'#fff':'rgba(255,255,255,.3)';c.lineWidth=i%3===0?3:1;c.beginPath();c.moveTo(x+Math.cos(a)*(r-10),y+Math.sin(a)*(r-10));c.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);c.stroke();}var now=new Date(),hr=now.getHours()%12,mn=now.getMinutes(),sc=now.getSeconds();var ha=(hr+mn/60)*Math.PI/6-Math.PI/2,ma=(mn+sc/60)*Math.PI/6-Math.PI/2,sa=sc*Math.PI/6-Math.PI/2;c.lineCap='round';c.strokeStyle='#fff';c.lineWidth=4;c.beginPath();c.moveTo(x,y);c.lineTo(x+Math.cos(ha)*44,y+Math.sin(ha)*44);c.stroke();c.lineWidth=3;c.beginPath();c.moveTo(x,y);c.lineTo(x+Math.cos(ma)*62,y+Math.sin(ma)*62);c.stroke();c.strokeStyle='#1888F2';c.lineWidth=1.5;c.beginPath();c.moveTo(x,y);c.lineTo(x+Math.cos(sa)*70,y+Math.sin(sa)*70);c.stroke();c.fillStyle='#1888F2';c.beginPath();c.arc(x,y,3,0,Math.PI*2);c.fill();var d=document.getElementById('clkd');if(d)d.textContent=String(now.getHours()).padStart(2,'0')+':'+String(mn).padStart(2,'0');var ds=document.getElementById('clks');if(ds)ds.textContent=':'+String(sc).padStart(2,'0');}
rT();};

apps.calendar=function(el){
var now=new Date(),yr=now.getFullYear(),mo=now.getMonth();
function render(){var ms=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
el.innerHTML=mkH('日历',{bg:'#000'})+'<div class="ab"><div class="cal"><div class="cal-hd"><button id="cp">‹</button><h2>'+yr+'年 '+ms[mo]+'</h2><button id="cn">›</button></div><div class="cal-week"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div><div class="cal-grid" id="cag"></div><div class="cal-detail"><h3 id="cad-t"></h3><p id="cad-b"></p></div></div></div>';
var grid=document.getElementById('cag'),first=new Date(yr,mo,1).getDay(),days=new Date(yr,mo+1,0).getDate(),prev=new Date(yr,mo,0).getDate();
for(var i=first-1;i>=0;i--){var d=document.createElement('div');d.className='cal-day other';d.textContent=prev-i;grid.appendChild(d);}
for(var i=1;i<=days;i++){var d=document.createElement('div');d.className='cal-day';if(i===now.getDate()&&mo===now.getMonth()&&yr===now.getFullYear())d.classList.add('today');d.textContent=i;(function(day){d.onclick=function(){var wd=['周日','周一','周二','周三','周四','周五','周六'];document.getElementById('cad-t').textContent=yr+'年'+(mo+1)+'月'+day+'日 '+wd[new Date(yr,mo,day).getDay()];var ev=['没有事件','团队会议','生日聚会','健身','电影之夜','阅读时间'];document.getElementById('cad-b').textContent=ev[day%ev.length]||'没有事件';};})(i);grid.appendChild(d);}
var rem=42-first-days;for(var i=1;i<=rem;i++){var d=document.createElement('div');d.className='cal-day other';d.textContent=i;grid.appendChild(d);}

document.getElementById('cad-t').textContent=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 今天';document.getElementById('cad-b').textContent='点击日期查看详情';
}render();};
