<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>iPhone</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,'SF Pro','Segoe UI',sans-serif}
:root{--accent:#007aff;--green:#30d158;--red:#ff453a;--orange:#ff9500;--gold:#ffd700;--txt:#f5f5f7;--muted:rgba(255,255,255,.55);--surface:#1c1c1e;--navH:48px}

#device{width:100%;height:100%;max-width:430px;max-height:932px;margin:0 auto;position:relative;overflow:hidden;background:#000}
@media(min-width:500px){#device{border-radius:50px;border:6px solid #2a2a2a;margin-top:20px;height:calc(100% - 40px);box-shadow:0 0 0 2px #1a1a1a,inset 0 0 80px rgba(0,0,0,.5)}}
#notch{display:none}
@media(min-width:500px){#notch{display:block;position:absolute;top:0;left:50%;transform:translateX(-50%);width:126px;height:34px;background:#000;border-radius:0 0 20px 20px;z-index:999}}

#sb{position:absolute;top:0;left:0;right:0;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 28px 0 24px;z-index:900;color:#f5f5f7;font-size:14px;font-weight:600}
.sb-r{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500}
.sb-bat{display:flex;align-items:center;gap:2px}
.sb-bat-box{width:22px;height:11px;border:1.5px solid #f5f5f7;border-radius:3px;display:flex;align-items:center;padding:1.5px}
.sb-bat-fill{height:100%;background:#30d158;border-radius:1px;width:100%}
.sb-bat-tip{width:2px;height:5px;background:#f5f5f7;border-radius:0 1px 1px 0;margin-left:1px}

/* ═══ NAV BAR ═══ */
#navbar{position:absolute;bottom:0;left:0;right:0;height:var(--navH);display:flex;align-items:center;justify-content:center;gap:0;z-index:950;background:rgba(10,10,10,.85);backdrop-filter:blur(30px) saturate(150%);-webkit-backdrop-filter:blur(30px) saturate(150%);border-top:.5px solid rgba(255,255,255,.08)}
.nav-btn{flex:1;height:100%;display:flex;align-items:center;justify-content:center;background:none;border:none;color:rgba(255,255,255,.7);font-size:0;cursor:pointer;transition:background .12s,transform .1s;position:relative;-webkit-tap-highlight-color:transparent}
.nav-btn:active{background:rgba(255,255,255,.08);transform:scale(.85)}
.nav-btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-back svg{stroke-width:2.5}
.nav-home svg{stroke-width:2}
.nav-recent svg{stroke-width:1.8}
.nav-btn::after{content:'';position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:0;height:0;border-radius:50%;background:rgba(255,255,255,.15)}
.nav-btn:active::after{width:36px;height:36px;transition:width .2s,height .2s}

/* ═══ HOME ═══ */
#home{position:absolute;top:0;left:0;right:0;bottom:0;padding-top:44px;padding-bottom:calc(80px + var(--navH));display:flex;flex-direction:column;z-index:1;background:radial-gradient(ellipse at 30% 20%,#1a0533,transparent 60%),radial-gradient(ellipse at 70% 70%,#0d2b4a,transparent 50%),#0a0a12;overflow:hidden}
#search-wrap{padding:8px 16px;flex-shrink:0;position:relative}
#search{width:100%;height:36px;border:none;border-radius:10px;background:rgba(255,255,255,.12);color:#f5f5f7;font-size:15px;padding:0 14px 0 36px;outline:none}
#search::placeholder{color:rgba(255,255,255,.45)}
.search-icon{position:absolute;left:28px;top:17px;font-size:13px;pointer-events:none}
#grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:16px 0;padding:12px 16px;align-content:start;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;width:100%}
#grid::-webkit-scrollbar{display:none}
.ic{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.ic:active .ic-sq{transform:scale(.88);opacity:.7}
.ic-sq{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;transition:transform .15s,opacity .15s;background:#333;border:1px solid rgba(255,255,255,.08)}
.ic-lb{font-size:11px;color:#f5f5f7;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px}
#dots{display:flex;justify-content:center;gap:6px;padding:8px 0;flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3)}.dot.a{background:#f5f5f7}
#dock{position:absolute;bottom:var(--navH);left:0;right:0;height:80px;display:flex;align-items:center;justify-content:center;gap:16px;padding:0 20px;background:rgba(30,30,30,.65);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border-top:.5px solid rgba(255,255,255,.1);z-index:2}
#dock .ic-sq{width:56px;height:56px}
#dock .ic-lb{display:none}

/* ═══ APP VIEW ═══ */
#av{position:absolute;top:0;left:0;right:0;bottom:var(--navH);z-index:800;display:none;background:var(--surface);overflow:hidden}
#av.open{display:flex;flex-direction:column;animation:avIn .32s cubic-bezier(.16,1,.3,1) forwards}
#av.close{display:flex;flex-direction:column;animation:avOut .25s ease forwards}
@keyframes avIn{from{opacity:0;transform:scale(.92) translateY(30px)}to{opacity:1;transform:none}}
@keyframes avOut{to{opacity:0;transform:scale(.92) translateY(30px)}}
.ah{height:48px;display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;position:relative;z-index:2}
.ah-title{position:absolute;left:50%;transform:translateX(-50%);font-size:16px;font-weight:600;color:#f5f5f7;white-space:nowrap}
.ab{flex:1;overflow:hidden;display:flex;flex-direction:column}
.back-btn{background:none;border:none;color:var(--accent);font-size:32px;cursor:pointer;padding:4px 8px 4px 0;line-height:.8;font-weight:300}
.back-btn:active{opacity:.5}
.ah-r{margin-left:auto;display:flex;gap:8px}
.ah-btn{background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer;padding:6px 10px;border-radius:8px;font-weight:500}
.ah-btn:active{background:rgba(255,255,255,.1)}

/* ═══ RECENT APPS OVERLAY ═══ */
#recent{position:absolute;top:0;left:0;right:0;bottom:var(--navH);z-index:900;display:none;background:rgba(0,0,0,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);overflow-y:auto;-webkit-overflow-scrolling:touch}
#recent.show{display:block;animation:recIn .25s ease forwards}
@keyframes recIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
#recent.show.closing{animation:recOut .2s ease forwards}
@keyframes recOut{to{opacity:0;transform:translateY(20px)}}
.rc-title{padding:60px 20px 12px;font-size:22px;font-weight:700;color:#f5f5f7}
.rc-list{padding:0 16px 20px;display:flex;flex-direction:column;gap:12px}
.rc-card{background:rgba(255,255,255,.08);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .12s,background .12s}
.rc-card:active{transform:scale(.97);background:rgba(255,255,255,.12)}
.rc-card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.rc-card-info{flex:1}
.rc-card-name{font-size:15px;font-weight:600;color:#f5f5f7}
.rc-card-desc{font-size:12px;color:var(--muted);margin-top:2px}
.rc-card-close{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:6px 8px;border-radius:8px}
.rc-card-close:active{background:rgba(255,69,58,.15)}
.rc-empty{text-align:center;padding:80px 20px;color:var(--muted);font-size:15px}
.rc-clear-all{display:block;margin:0 auto 20px;padding:10px 28px;border:none;border-radius:12px;background:rgba(255,255,255,.1);color:#f5f5f7;font-size:14px;font-weight:600;cursor:pointer}
.rc-clear-all:active{background:rgba(255,255,255,.15)}

/* ── Snake ── */
.snake-wrap{flex:1;display:flex;flex-direction:column;background:#111}
.snake-top{display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
.sn-sc{text-align:center}.sn-sc span{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}.sn-sc b{font-size:22px;color:#f5f5f7}
.sn-btn{padding:6px 14px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:rgba(255,255,255,.12);color:#f5f5f7}.sn-btn:active{background:rgba(255,255,255,.2)}
.sn-cv-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:8px;position:relative}
#scv{border-radius:8px;background:#000;display:block}
.sn-ov{position:absolute;inset:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.7);border-radius:12px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:3;transition:opacity .3s}
.sn-ov.h{opacity:0;pointer-events:none}
.sn-ov h2{font-size:28px;color:#f5f5f7;margin:8px 0}
.sn-ov p{font-size:14px;color:var(--muted);margin-bottom:16px}
.sn-ov .big{font-size:44px;font-weight:800;background:linear-gradient(135deg,var(--green),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sn-play{width:52px;height:52px;border-radius:50%;border:none;background:var(--green);color:#fff;font-size:20px;cursor:pointer;box-shadow:0 4px 20px rgba(48,209,88,.4)}
.sn-play:active{transform:scale(.9)}
.sn-dpad{display:grid;grid-template-columns:repeat(3,52px);grid-template-rows:repeat(3,52px);gap:4px;padding:8px 0 12px;justify-content:center;flex-shrink:0}
.db{border:none;border-radius:12px;background:rgba(255,255,255,.1);color:#f5f5f7;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.db:active{background:rgba(255,255,255,.25)}.db.e{visibility:hidden}

/* ── Calc ── */
.calc{display:flex;flex-direction:column;height:100%;background:#000}
.calc-d{text-align:right;padding:16px 20px 8px;display:flex;flex-direction:column;justify-content:flex-end;min-height:80px}
.calc-expr{font-size:14px;color:var(--muted);min-height:18px}
.calc-v{font-size:48px;font-weight:300;color:#f5f5f7;line-height:1.1;word-break:break-all}
.calc-g{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;flex:1;padding:1px}
.cb{border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:filter .08s}
.cb:active{filter:brightness(.65)}
.cb.fn{background:#a5a5a5;color:#000;font-size:18px;font-weight:500}
.cb.op{background:var(--orange);color:#fff;font-size:24px}
.cb.n{background:#333;color:#fff}
.cb.z{grid-column:span 2;justify-content:flex-start;padding-left:22px}

/* ── 2048 ── */
.g2048{display:flex;flex-direction:column;height:100%;background:#000;padding:12px}
.g2-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.g2-h h1{font-size:28px;font-weight:800;color:#776e65}
.g2-scores{display:flex;gap:8px}
.g2-sc{text-align:center;background:rgba(255,255,255,.1);border-radius:8px;padding:4px 14px}
.g2-sc span{display:block;font-size:10px;color:var(--muted);text-transform:uppercase}.g2-sc b{font-size:18px;color:#f5f5f7}
.g2-board{flex:1;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:6px;background:rgba(255,255,255,.06);border-radius:10px;padding:6px;position:relative;touch-action:none}
.g2-t{border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;transition:all .12s ease}
.g2-t[data-v="0"]{background:rgba(255,255,255,.04);color:transparent}
.g2-t[data-v="2"]{background:#eee4da;color:#776e65}
.g2-t[data-v="4"]{background:#ede0c8;color:#776e65}
.g2-t[data-v="8"]{background:#f2b179;color:#fff}
.g2-t[data-v="16"]{background:#f59563;color:#fff}
.g2-t[data-v="32"]{background:#f67c5f;color:#fff}
.g2-t[data-v="64"]{background:#f65e3b;color:#fff}
.g2-t[data-v="128"]{background:#edcf72;color:#fff;font-size:20px}
.g2-t[data-v="256"]{background:#edcc61;color:#fff;font-size:20px}
.g2-t[data-v="512"]{background:#edc850;color:#fff;font-size:20px}
.g2-t[data-v="1024"]{background:#edc53f;color:#fff;font-size:16px}
.g2-t[data-v="2048"]{background:#edc22e;color:#fff;font-size:16px}
.g2-ov{position:absolute;inset:0;background:rgba(0,0,0,.6);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:3}
.g2-ov.h{display:none}
.g2-ov h2{color:#f5f5f7;font-size:32px;margin-bottom:12px}
.g2-ov button{padding:10px 28px;border:none;border-radius:10px;background:var(--orange);color:#fff;font-size:16px;font-weight:600;cursor:pointer}
.g2-btns{display:flex;gap:8px;margin-top:10px;justify-content:center}
.g2-btns button{padding:8px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:rgba(255,255,255,.1);color:#f5f5f7}

/* ── Terminal ── */
.term{display:flex;flex-direction:column;height:100%;background:#0c0c0c}
.term-out{flex:1;overflow-y:auto;padding:12px;font-family:'SF Mono','Menlo','Courier New',monospace;font-size:13px;line-height:1.5;color:#30d158;-webkit-overflow-scrolling:touch}
.term-out::-webkit-scrollbar{display:none}
.term-line{margin-bottom:2px;word-break:break-all}
.term-line.cmd{color:#fff}.term-line.err{color:var(--red)}.term-line.info{color:var(--accent)}
.term-in{display:flex;align-items:center;padding:8px 12px;border-top:1px solid rgba(255,255,255,.08);font-family:'SF Mono','Menlo','Courier New',monospace;font-size:13px;flex-shrink:0}
.term-ps{color:var(--green);margin-right:6px;white-space:nowrap}
.term-input{flex:1;background:none;border:none;color:#fff;font-size:13px;font-family:inherit;outline:none;caret-color:var(--green)}

/* ── Messages ── */
.msg-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.msg-ct{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:.5px solid rgba(255,255,255,.06)}
.msg-ct:active{background:rgba(255,255,255,.05)}
.msg-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.msg-nfo{flex:1;min-width:0}
.msg-nm{font-size:15px;font-weight:500;color:#f5f5f7}
.msg-pr{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat{flex:1;display:flex;flex-direction:column}
.chat-h{height:48px;display:flex;align-items:center;padding:0 12px;border-bottom:.5px solid rgba(255,255,255,.06);flex-shrink:0;gap:8px}
.chat-h span{font-size:16px;font-weight:600;color:#f5f5f7}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:6px;-webkit-overflow-scrolling:touch}
.bub{max-width:75%;padding:8px 12px;border-radius:16px;font-size:14px;line-height:1.4;word-wrap:break-word;animation:bi .2s ease}
@keyframes bi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.bub.me{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.bub.them{align-self:flex-start;background:rgba(255,255,255,.12);color:#f5f5f7;border-bottom-left-radius:4px}
.chat-bar{display:flex;gap:8px;padding:8px 12px;border-top:.5px solid rgba(255,255,255,.06);flex-shrink:0}
.chat-bar input{flex:1;height:34px;border:none;border-radius:17px;background:rgba(255,255,255,.1);color:#f5f5f7;font-size:14px;padding:0 14px;outline:none}
.chat-bar input:focus{box-shadow:0 0 0 1.5px var(--accent)}
.chat-bar button{height:34px;padding:0 16px;border:none;border-radius:17px;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0}

/* ── Music ── */
.music{display:flex;flex-direction:column;height:100%;background:#000}
.m-vis{height:120px;flex-shrink:0}
.m-vis canvas{width:100%;height:100%;display:block}
.m-info{text-align:center;padding:12px 16px 4px}
.m-info h3{font-size:17px;font-weight:600;color:#f5f5f7;margin-bottom:2px}
.m-info p{font-size:13px;color:var(--muted)}
.m-prog{display:flex;align-items:center;gap:8px;padding:8px 20px}
.m-pbar{flex:1;height:4px;background:rgba(255,255,255,.12);border-radius:2px;cursor:pointer}
.m-pfill{height:100%;background:var(--accent);border-radius:2px;width:0;transition:width .4s linear}
.m-tm{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:30px}
.m-ctrl{display:flex;align-items:center;justify-content:center;gap:20px;padding:4px 0 8px}
.mc{border:none;background:transparent;color:#f5f5f7;font-size:18px;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.mc:active{background:rgba(255,255,255,.1)}
.mc.pp{font-size:28px;width:52px;height:52px;background:var(--accent);color:#fff;border-radius:50%}
.m-vol{display:flex;align-items:center;gap:8px;padding:0 20px 6px;font-size:11px;color:var(--muted)}
.m-vbar{flex:1;height:4px;background:rgba(255,255,255,.12);border-radius:2px;cursor:pointer}
.m-vfill{height:100%;background:var(--accent);border-radius:2px;width:70%}
.m-list{flex:1;overflow-y:auto;border-top:.5px solid rgba(255,255,255,.08);-webkit-overflow-scrolling:touch}
.ml{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;border-bottom:.5px solid rgba(255,255,255,.04)}
.ml:active{background:rgba(255,255,255,.05)}.ml.on{background:rgba(0,122,255,.12)}
.ml-i{width:20px;text-align:center;font-size:13px;color:var(--muted)}
.ml-t{flex:1;font-size:14px;color:#f5f5f7;font-weight:500}
.ml-a{font-size:12px;color:var(--muted)}.ml-d{font-size:12px;color:var(--muted)}

/* ── Weather ── */
.weather{display:flex;flex-direction:column;height:100%;background:linear-gradient(180deg,#4a90d9,#2d6aa0);color:#fff;padding:12px 20px}
.w-city{font-size:18px;opacity:.8;text-align:center}
.w-temp{font-size:72px;font-weight:200;text-align:center;line-height:1;margin:8px 0}
.w-desc{font-size:16px;text-align:center;opacity:.8;margin-bottom:4px}
.w-hl{text-align:center;font-size:14px;opacity:.7;margin-bottom:20px}
.w-hourly{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.w-hourly::-webkit-scrollbar{display:none}
.w-h{text-align:center;min-width:48px;flex-shrink:0}
.w-h span{display:block;font-size:12px;opacity:.7}.w-h .wi{font-size:22px;margin:6px 0}.w-h b{font-size:14px;font-weight:500}
.w-forecast{background:rgba(255,255,255,.15);border-radius:14px;padding:14px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);flex:1;overflow-y:auto}
.w-forecast h4{font-size:13px;font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em;opacity:.7}
.w-fr{display:flex;align-items:center;padding:8px 0;border-bottom:.5px solid rgba(255,255,255,.1)}
.w-fr:last-child{border:none}
.w-fr span:first-child{width:50px;font-size:14px}.w-fr .wi{font-size:20px;width:36px;text-align:center}.w-fr span:last-child{margin-left:auto;font-size:14px}

/* ── Clock ── */
.clock{display:flex;flex-direction:column;height:100%;background:#000}
.cl-tabs{display:flex;border-bottom:.5px solid rgba(255,255,255,.1);flex-shrink:0}
.cl-tab{flex:1;text-align:center;padding:10px;font-size:13px;color:var(--muted);cursor:pointer;font-weight:500;border-bottom:2px solid transparent}
.cl-tab.on{color:var(--orange);border-bottom-color:var(--orange)}
.cl-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.cl-face{width:220px;height:220px;margin-bottom:20px}
.cl-face canvas{width:100%;height:100%}
.cl-dig{font-size:42px;font-weight:200;color:#f5f5f7;font-variant-numeric:tabular-nums;margin-bottom:6px}
.cl-sec{font-size:16px;color:var(--muted);margin-bottom:24px}
.sw-display{font-size:52px;font-weight:200;color:#f5f5f7;font-variant-numeric:tabular-nums;margin-bottom:24px}
.sw-btns{display:flex;gap:16px}
.sw-btn{width:72px;height:72px;border-radius:50%;border:none;font-size:14px;font-weight:600;cursor:pointer}
.sw-btn:active{filter:brightness(.8)}
.sw-start{background:var(--green);color:#fff}
.sw-lap{background:rgba(255,255,255,.15);color:#f5f5f7}
.sw-stop{background:var(--red);color:#fff}
.sw-laps{width:100%;max-width:300px;max-height:200px;overflow-y:auto;margin-top:16px}
.sw-lap-r{display:flex;justify-content:space-between;padding:6px 0;border-bottom:.5px solid rgba(255,255,255,.06);font-size:14px;color:var(--muted)}
.tmr-sel{display:flex;gap:12px;align-items:center;margin-bottom:24px}
.tmr-btn{width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.12);color:#f5f5f7;font-size:20px;cursor:pointer}
.tmr-val{font-size:48px;font-weight:200;color:#f5f5f7;min-width:80px;text-align:center;font-variant-numeric:tabular-nums}
.tmr-go{padding:12px 36px;border:none;border-radius:30px;background:var(--green);color:#fff;font-size:16px;font-weight:600;cursor:pointer}

/* ── Notes ── */
.notes{display:flex;flex-direction:column;height:100%;background:#000}
.nt-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.nt{padding:14px 16px;border-bottom:.5px solid rgba(255,255,255,.06);cursor:pointer}
.nt:active{background:rgba(255,255,255,.05)}
.nt h4{font-size:15px;font-weight:600;color:#f5f5f7;margin-bottom:3px}
.nt p{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nt-date{font-size:11px;color:rgba(255,255,255,.3);margin-top:4px}
.nt-edit{flex:1;display:flex;flex-direction:column}
.nt-edit textarea{flex:1;background:transparent;border:none;color:#f5f5f7;font-size:15px;padding:12px 16px;outline:none;resize:none;line-height:1.6;font-family:inherit}

/* ── Settings ── */
.set{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px}
.set-group{margin:12px 16px 0;background:rgba(255,255,255,.06);border-radius:12px;overflow:hidden}
.set-item{display:flex;align-items:center;padding:12px 16px;border-bottom:.5px solid rgba(255,255,255,.04);gap:12px}
.set-item:last-child{border:none}
.set-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.set-label{flex:1;font-size:15px;color:#f5f5f7}
.set-val{font-size:14px;color:var(--muted)}
.toggle{width:48px;height:28px;border-radius:14px;background:rgba(255,255,255,.2);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:24px;height:24px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on::after{transform:translateX(20px)}

/* ── Calendar ── */
.cal{display:flex;flex-direction:column;height:100%;background:#000}
.cal-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.cal-hd h2{font-size:20px;font-weight:700;color:#f5f5f7}
.cal-hd button{background:none;border:none;color:var(--accent);font-size:20px;cursor:pointer;padding:4px 8px}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;padding:0 8px;margin-bottom:4px}
.cal-week span{font-size:12px;color:var(--muted);font-weight:600;padding:6px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 8px}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:14px;color:#f5f5f7;cursor:pointer}
.cal-day:active{background:rgba(255,255,255,.1)}
.cal-day.today{background:var(--accent);color:#fff;font-weight:700}
.cal-day.other{color:rgba(255,255,255,.2)}
.cal-detail{margin:16px;padding:16px;background:rgba(255,255,255,.06);border-radius:12px;flex:1}
.cal-detail h3{font-size:15px;color:#f5f5f7;margin-bottom:6px}
.cal-detail p{font-size:13px;color:var(--muted)}

/* ── Safari ── */
.saf{display:flex;flex-direction:column;height:100%;background:var(--surface)}
.saf-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:.5px solid rgba(255,255,255,.08);flex-shrink:0}
.saf-bar input{flex:1;height:32px;border:none;border-radius:10px;background:rgba(255,255,255,.1);color:#f5f5f7;font-size:14px;padding:0 12px;outline:none}
.saf-bar button{background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer;padding:6px}
.saf-content{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;background:#111}
.saf-start{padding:40px 20px;text-align:center}
.saf-favs{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:24px 0}
.saf-fav{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.saf-fi{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.saf-fn{font-size:11px;color:var(--muted)}

/* ── Photos ── */
.photos{display:flex;flex-direction:column;height:100%;background:#000}
.p-grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px;-webkit-overflow-scrolling:touch}
.p-item{aspect-ratio:1;cursor:pointer;overflow:hidden}
.p-item:active{opacity:.7}
.p-item img{width:100%;height:100%;object-fit:cover;display:block}

/* ── Trash ── */
.trash{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tr-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:.5px solid rgba(255,255,255,.06)}
.tr-item:active{background:rgba(255,255,255,.05)}
.tr-icon{font-size:24px;flex-shrink:0}
.tr-info{flex:1;min-width:0}
.tr-name{font-size:14px;color:#f5f5f7;font-weight:500}
.tr-meta{font-size:12px;color:var(--muted)}
.tr-empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px}

/* ═══ RECHARGE ═══ */
.rc-app{display:flex;flex-direction:column;height:100%;background:linear-gradient(180deg,#1a0a00 0%,#0d0500 30%,#000 100%)}
.rc-hero{position:relative;padding:20px 20px 16px;text-align:center;overflow:hidden;flex-shrink:0}
.rc-hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at center,rgba(255,185,0,.15),transparent 60%);animation:rcGlow 3s ease-in-out infinite alternate}
@keyframes rcGlow{from{opacity:.3;transform:scale(.8)}to{opacity:1;transform:scale(1.1)}}
.rc-vip{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.05em;margin-bottom:10px;position:relative}
.rc-vip.l0{background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
.rc-vip.l1{background:linear-gradient(135deg,#cd7f32,#b8860b);color:#fff}
.rc-vip.l2{background:linear-gradient(135deg,#c0c0c0,#a8a8a8);color:#fff}
.rc-vip.l3{background:linear-gradient(135deg,var(--gold),#daa520);color:#000}
.rc-vip.l4{background:linear-gradient(135deg,#e8e8e8,#fff,#e8e8e8);color:#000;box-shadow:0 0 20px rgba(255,215,0,.4)}
.rc-vip.l5{background:linear-gradient(135deg,#ff0040,#ff6b00,#ffd700);color:#fff;box-shadow:0 0 30px rgba(255,0,64,.4);animation:vipShine 1.5s ease-in-out infinite}
@keyframes vipShine{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
.rc-bal{position:relative;margin:8px 0}
.rc-bal-label{font-size:12px;color:rgba(255,215,0,.6);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.rc-bal-val{font-size:42px;font-weight:800;background:linear-gradient(135deg,#ffd700,#ffaa00,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;font-variant-numeric:tabular-nums}
.rc-bal-val.sparkle{animation:sparkle .1s ease}
@keyframes sparkle{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.rc-bal-sub{font-size:12px;color:rgba(255,255,255,.4);margin-top:4px}
.rc-stats{display:flex;justify-content:center;gap:24px;margin-top:12px}
.rc-stat{text-align:center}
.rc-stat span{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.rc-stat b{font-size:16px;color:#f5f5f7}
.rc-grid{flex:1;overflow-y:auto;padding:0 12px 12px;-webkit-overflow-scrolling:touch}
.rc-section{margin-bottom:16px}
.rc-section-title{font-size:13px;font-weight:600;color:var(--muted);padding:8px 4px;text-transform:uppercase;letter-spacing:.04em}
.rc-pkg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.rc-item{position:relative;border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;transition:transform .15s;overflow:hidden}
.rc-item:active{transform:scale(.93)}
.rc-item .ri-amt{font-size:18px;font-weight:800;color:#fff;line-height:1.1}
.rc-item .ri-coin{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px}
.rc-item .ri-tag{position:absolute;top:6px;right:6px;font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px;background:var(--red);color:#fff}
.rc-hot{background:linear-gradient(135deg,#ff6b35,#ff2d55)}
.rc-gold{background:linear-gradient(135deg,#c9972e,#ffd700)}
.rc-diamond{background:linear-gradient(135deg,#6a5acd,#9370db)}
.rc-mythic{background:linear-gradient(135deg,#ff0040,#ff6b00,#ffd700)}
.rc-supreme{background:linear-gradient(135deg,#00c6ff,#0072ff,#7209b7)}
.rc-infinite{background:linear-gradient(135deg,#ff0844,#ffb199,#ffd700,#00e5ff,#00c6ff);background-size:300% 300%;animation:rcShift 3s ease infinite}
@keyframes rcShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.rc-big-btn{margin:8px 12px 12px;padding:16px;border:none;border-radius:16px;font-size:18px;font-weight:800;cursor:pointer;overflow:hidden;color:#000;background:linear-gradient(135deg,#ffd700,#ffaa00,#ffd700);background-size:200% 200%;animation:rcShift 2s ease infinite;box-shadow:0 4px 24px rgba(255,185,0,.4);flex-shrink:0}
.rc-big-btn:active{transform:scale(.97)}
.rc-log{padding:0 12px 12px;flex-shrink:0}
.rc-log-title{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase}
.rc-log-list{max-height:80px;overflow-y:auto;font-size:11px;color:rgba(255,215,0,.7);line-height:1.6}
.rc-log-list::-webkit-scrollbar{display:none}
.confetti{position:fixed;pointer-events:none;z-index:99999}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;animation:confFall linear forwards}
@keyframes confFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
.rc-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:52px;font-weight:900;color:var(--gold);text-shadow:0 0 30px rgba(255,215,0,.8),0 0 60px rgba(255,185,0,.4);pointer-events:none;z-index:99999;animation:rcPop .8s ease forwards;white-space:nowrap}
@keyframes rcPop{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}30%{transform:translate(-50%,-50%) scale(1.3)}60%{transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-100%) scale(.8)}}

/* ── Lightbox ── */
.p-lb{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center;z-index:9999;flex-direction:column}
.p-lb.show{display:flex}
.p-lb img{max-width:92%;max-height:70%;border-radius:8px}
.p-lb-info{color:var(--muted);font-size:13px;margin-top:12px}
.p-lb-close{position:absolute;top:50px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer}
.p-lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer}
.p-lb-nav.pl{left:8px}.p-lb-nav.pr{right:8px}
</style>

<body>
<div id="device">
  <div id="notch"></div>
  <div id="sb"><span id="sbt">9:41</span><div class="sb-r"><span style="font-size:11px">●●●●○</span><span style="font-size:10px">WiFi</span><div class="sb-bat"><div class="sb-bat-box"><div class="sb-bat-fill"></div></div><div class="sb-bat-tip"></div></div></div></div>

  <div id="home">
    <div id="search-wrap"><span class="search-icon">🔍</span><input id="search" placeholder="搜索" readonly></div>
    <div id="grid"></div>
    <div id="dots"><span class="dot a"></span></div>
    <div id="dock"></div>
  </div>

  <div id="av"></div>
  <div id="recent"></div>

  <!-- NAV BAR -->
  <div id="navbar">
    <button class="nav-btn nav-back" id="navBack" title="返回">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="nav-btn nav-home" id="navHome" title="主页">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
    </button>
    <button class="nav-btn nav-recent" id="navRecent" title="最近">
      <svg viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="3"/></svg>
    </button>
  </div>
</div>

<script>
(function(){
'use strict';
var curApp=null,apps={},recentApps=[];

var APPS=[
  {id:'messages',name:'信息',icon:'💬',bg:'linear-gradient(135deg,#5ac8fa,#007aff)'},
  {id:'calendar',name:'日历',icon:'📅',bg:'linear-gradient(180deg,#ff3b30 0%,#ff3b30 50%,#fff 50%,#fff 100%)',ic:'#000'},
  {id:'weather',name:'天气',icon:'🌤',bg:'linear-gradient(135deg,#4facfe,#00f2fe)'},
  {id:'clock',name:'时钟',icon:'⏰',bg:'linear-gradient(135deg,#48484a,#1c1c1e)'},
  {id:'notes',name:'备忘录',icon:'📝',bg:'linear-gradient(135deg,#ffeaa7,#fdcb6e)',ic:'#000'},
  {id:'terminal',name:'终端',icon:'💻',bg:'linear-gradient(135deg,#2a2a4e,#000)'},
  {id:'recharge',name:'充值中心',icon:'💰',bg:'linear-gradient(135deg,#ffd700,#ff6b00)'},
  {id:'settings',name:'设置',icon:'⚙️',bg:'linear-gradient(135deg,#636366,#8e8e93)'},
  {id:'snake',name:'贪吃蛇',icon:'🐍',bg:'linear-gradient(135deg,#30d158,#007aff)'},
  {id:'calc',name:'计算器',icon:'🧮',bg:'linear-gradient(135deg,#505050,#2c2c2e)'},
  {id:'game2048',name:'2048',icon:'🎮',bg:'linear-gradient(135deg,#ff9500,#ff6b00)'},
  {id:'photos',name:'照片',icon:'🌈',bg:'linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb)'},
  {id:'music',name:'音乐',icon:'🎵',bg:'linear-gradient(135deg,#fc5c7d,#6a82fb)'},
  {id:'safari',name:'Safari',icon:'🧭',bg:'linear-gradient(135deg,#56ccf2,#2f80ed)'},
  {id:'trash',name:'废纸篓',icon:'🗑️',bg:'linear-gradient(135deg,#8e8e93,#636366)'}
];
var DOCK_IDS=['safari','messages','music','recharge'];

function getAppInfo(id){for(var i=0;i<APPS.length;i++)if(APPS[i].id===id)return APPS[i];return null;}

/* ═══ BUILD HOME ═══ */
function buildHome(){
  var g=document.getElementById('grid');g.innerHTML='';
  for(var i=0;i<APPS.length;i++){
    (function(a){
      var d=document.createElement('div');d.className='ic';
      d.innerHTML='<div class="ic-sq" style="background:'+a.bg+'">'+a.icon+'</div><span class="ic-lb">'+a.name+'</span>';
      d.addEventListener('click',function(){openApp(a.id);});
      g.appendChild(d);
    })(APPS[i]);
  }
  var dk=document.getElementById('dock');dk.innerHTML='';
  for(var j=0;j<DOCK_IDS.length;j++){
    (function(id){
      var a=getAppInfo(id);if(!a)return;
      var d=document.createElement('div');d.className='ic';
      d.innerHTML='<div class="ic-sq" style="background:'+a.bg+'">'+a.icon+'</div><span class="ic-lb">'+a.name+'</span>';
      d.addEventListener('click',function(){openApp(a.id);});
      dk.appendChild(d);
    })(DOCK_IDS[j]);
  }
}

/* ═══ APP MANAGEMENT ═══ */
function openApp(id){
  if(!apps[id])return;
  closeRecent();
  curApp=id;
  // Add to recent (move to front if exists)
  var idx=recentApps.indexOf(id);
  if(idx>-1)recentApps.splice(idx,1);
  recentApps.unshift(id);
  if(recentApps.length>8)recentApps.pop();
  var av=document.getElementById('av');av.innerHTML='';av.className='open';apps[id](av);
}

function goHome(){
  closeRecent();
  var av=document.getElementById('av');av.className='close';curApp=null;
  setTimeout(function(){av.innerHTML='';av.className='';},260);
}
window.goHome=goHome;

function goBack(){
  // If recent is open, close it
  var rec=document.getElementById('recent');
  if(rec.classList.contains('show')){closeRecent();return;}
  // If app is open, go home
  if(curApp)goHome();
}

/* ═══ RECENT APPS ═══ */
function toggleRecent(){
  var rec=document.getElementById('recent');
  if(rec.classList.contains('show')){closeRecent();return;}
  renderRecent();
  rec.classList.remove('closing');
  rec.classList.add('show');
}

function closeRecent(){
  var rec=document.getElementById('recent');
  if(!rec.classList.contains('show'))return;
  rec.classList.add('closing');
  setTimeout(function(){rec.classList.remove('show','closing');},220);
}

function renderRecent(){
  var rec=document.getElementById('recent');
  if(!recentApps.length){
    rec.innerHTML='<div class="rc-empty"><div style="font-size:40px;margin-bottom:12px">📱</div>没有最近使用的应用</div>';
    return;
  }
  var html='<div class="rc-title">最近使用</div><div class="rc-list">';
  for(var i=0;i<recentApps.length;i++){
    var a=getAppInfo(recentApps[i]);if(!a)continue;
    html+='<div class="rc-card" data-app="'+a.id+'"><div class="rc-card-icon" style="background:'+a.bg+'">'+a.icon+'</div><div class="rc-card-info"><div class="rc-card-name">'+a.name+'</div><div class="rc-card-desc">点击打开</div></div></div>';
  }
  html+='</div>';
  if(recentApps.length>1)html+='<button class="rc-clear-all" id="rcClearAll">清除全部</button>';
  rec.innerHTML=html;
  // Bind
  rec.querySelectorAll('[data-app]').forEach(function(el){
    el.addEventListener('click',function(e){
      if(e.target.classList.contains('rc-card-close'))return;
      openApp(el.dataset.app);
    });
  });
  var clearBtn=document.getElementById('rcClearAll');
  if(clearBtn)clearBtn.addEventListener('click',function(){recentApps=[];renderRecent();});
}

/* ═══ NAV BUTTONS ═══ */
document.getElementById('navBack').addEventListener('click',goBack);
document.getElementById('navHome').addEventListener('click',goHome);
document.getElementById('navRecent').addEventListener('click',toggleRecent);

/* ═══ UTILS ═══ */
function mkH(title,opts){opts=opts||{};return'<div class="ah" style="background:'+(opts.bg||'var(--surface)')+';color:'+(opts.color||'#f5f5f7')+'"><button class="back-btn" onclick="goHome()">‹</button><span class="ah-title">'+title+'</span>'+(opts.right||'')+'</div>';}
function updateClock(){var n=new Date();document.getElementById('sbt').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
updateClock();setInterval(updateClock,10000);

/* ═══════════ RECHARGE ═══════════ */
apps.recharge=function(el){
  var balance=parseFloat(localStorage.getItem('rc_bal')||'0'),total=parseFloat(localStorage.getItem('rc_total')||'0'),count=parseInt(localStorage.getItem('rc_count')||'0'),logs=JSON.parse(localStorage.getItem('rc_logs')||'[]');
  function getVip(){if(total>=1e8)return 5;if(total>=1e7)return 4;if(total>=1e6)return 3;if(total>=1e5)return 2;if(total>=1e4)return 1;return 0;}
  function vipN(l){return['普通用户','青铜VIP','白银VIP','黄金VIP','钻石VIP','至尊SVIP'][l];}
  function vipC(l){return'l'+l;}
  function fmt(n){if(n>=1e8)return(n/1e8).toFixed(2)+'亿';if(n>=1e4)return(n/1e4).toFixed(2)+'万';return n.toFixed(2);}
  function save(){localStorage.setItem('rc_bal',balance);localStorage.setItem('rc_total',total);localStorage.setItem('rc_count',count);localStorage.setItem('rc_logs',JSON.stringify(logs.slice(0,50)));}

  function lerp(a,b,t){var ar=parseInt(a.slice(1,3),16),ag=parseInt(a.slice(3,5),16),ab=parseInt(a.slice(5,7),16),br=parseInt(b.slice(1,3),16),bg=parseInt(b.slice(3,5),16),bb=parseInt(b.slice(5,7),16);return'rgb('+Math.round(ar+(br-ar)*t)+','+Math.round(ag+(bg-ag)*t)+','+Math.round(ab+(bb-ab)*t)+')';}

  var convos={Alice:[{f:'them',t:'你好！'},{f:'me',t:'挺好的！'},{f:'them',t:'周末有空吗？'}],Bob:[{f:'them',t:'看了比赛吗？'},{f:'me',t:'太精彩了！'}],Carol:[{f:'them',t:'会议改到三点'},{f:'me',t:'收到'}],MiMo_Bot:[{f:'them',t:'你好！我是 MiMo'}]};
  var replies=['收到！','好的','哈哈','有道理','没问题！','太好了！','确实','了解了','赞同！','OK'];
  var active=null;
  function showList(){el.innerHTML=mkH('信息')+'<div class="ab"><div class="msg-list" id="ml"></div></div>';var ml=document.getElementById('ml');contacts.forEach(function(c){var d=document.createElement('div');d.className='msg-ct';var msgs=convos[c.name.replace(' ','_')]||[];var last=msgs.length?msgs[msgs.length-1].t:'';d.innerHTML='<div class="msg-av" style="background:'+c.color+'">'+c.emoji+'</div><div class="msg-nfo"><div class="msg-nm">'+c.name+'</div><div class="msg-pr">'+last+'</div></div>';d.onclick=function(){showChat(c);};ml.appendChild(d);});}
  function showChat(c){active=c.name.replace(' ','_');el.innerHTML='<div class="chat"><div class="chat-h"><button class="back-btn" id="chat-back">‹</button><span>'+c.name+'</span></div><div class="chat-msgs" id="cms"></div><div class="chat-bar"><input id="ci" placeholder="输入信息..."><button id="csend">发送</button></div></div>';document.getElementById('chat-back').onclick=showList;renderMsgs();var ci=document.getElementById('ci');document.getElementById('csend').onclick=function(){sendMsg(ci);};ci.addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg(ci);});setTimeout(function(){ci.focus();},300);}
  function renderMsgs(){var cms=document.getElementById('cms');if(!cms)return;cms.innerHTML='';(convos[active]||[]).forEach(function(m){var d=document.createElement('div');d.className='bub '+(m.f==='me'?'me':'them');d.textContent=m.t;cms.appendChild(d);});cms.scrollTop=cms.scrollHeight;}
  function sendMsg(ci){var t=ci.value.trim();if(!t||!active)return;ci.value='';if(!convos[active])convos[active]=[];convos[active].push({f:'me',t:t});renderMsgs();setTimeout(function(){convos[active].push({f:'them',t:replies[Math.floor(Math.random()*replies.length)]});renderMsgs();},600+Math.random()*1500);}
  showList();
};

apps.music=function(el){

  var actx,analyser,gain,dataArr,cur=0,note=0,playing=false,tmr=null,mcanvas,mctx,visId=null,vol=.7,tStart,tElap=0;
  function initAudio(){if(actx)return;actx=new(window.AudioContext||window.webkitAudioContext)();analyser=actx.createAnalyser();analyser.fftSize=256;analyser.connect(actx.destination);gain=actx.createGain();gain.gain.value=vol;gain.connect(analyser);dataArr=new Uint8Array(analyser.frequencyBinCount);}
  function getDur(s){var t=0;s.notes.forEach(function(n){t+=n.d;});var sec=Math.round(t/1000);return Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0');}
  el.innerHTML=mkH('音乐',{bg:'#000'})+'<div class="ab"><div class="music"><div class="m-vis"><canvas id="mcv"></canvas></div><div class="m-info"><h3 id="mn">未在播放</h3><p id="ma">选择一首歌曲</p></div><div class="m-prog"><span class="m-tm" id="mcur">0:00</span><div class="m-pbar"><div class="m-pfill" id="mpf"></div></div><span class="m-tm" id="mdur">0:00</span></div><div class="m-ctrl"><button class="mc" id="mp">⏮</button><button class="mc pp" id="mpp">▶</button><button class="mc" id="mn2">⏭</button></div><div class="m-vol"><span>🔈</span><div class="m-vbar" id="mvb"><div class="m-vfill" id="mvf"></div></div><span>🔊</span></div><div class="m-list" id="mli"></div></div></div>';
  mcanvas=document.getElementById('mcv');mctx=mcanvas.getContext('2d');function rz(){var p=mcanvas.parentElement;mcanvas.width=p.clientWidth;mcanvas.height=p.clientHeight;}rz();
  function renderList(){var ml=document.getElementById('mli');ml.innerHTML='';songs.forEach(function(s,i){var d=document.createElement('div');d.className='ml'+(i===cur?' on':'');d.innerHTML='<span class="ml-i">'+(playing&&i===cur?'♪':i+1)+'</span><div class="ml-t">'+s.name+'</div><span class="ml-a">'+s.artist+'</span><span class="ml-d">'+getDur(s)+'</span>';d.onclick=function(){cur=i;note=0;if(playing){clearTimeout(tmr);playNote();}updInfo();};ml.appendChild(d);});}
  function updInfo(){document.getElementById('mn').textContent=playing?songs[cur].name:'未在播放';document.getElementById('ma').textContent=playing?songs[cur].artist:'选择一首歌曲';document.getElementById('mdur').textContent=getDur(songs[cur]);renderList();}

  function drawVis(){if(!playing)return;visId=requestAnimationFrame(drawVis);analyser.getByteFrequencyData(dataArr);mctx.fillStyle='#000';mctx.fillRect(0,0,mcanvas.width,mcanvas.height);var bw=mcanvas.width/(dataArr.length)*2.5,x=0;for(var i=0;i<dataArr.length;i++){var bh=dataArr[i]/255*mcanvas.height;var g=mctx.createLinearGradient(0,mcanvas.height,0,mcanvas.height-bh);g.addColorStop(0,'#ff2d55');g.addColorStop(1,'#af52de');mctx.fillStyle=g;mctx.fillRect(x,mcanvas.height-bh,bw,bh);x+=bw+1;}}
  document.getElementById('mpp').onclick=function(){if(playing){playing=false;clearTimeout(tmr);cancelAnimationFrame(visId);document.getElementById('mpp').textContent='▶';updInfo();}else play();};
  document.getElementById('mp').onclick=function(){clearTimeout(tmr);cur=(cur-1+songs.length)%songs.length;note=0;tElap=0;tStart=Date.now();updInfo();if(playing)playNote();};
  document.getElementById('mn2').onclick=function(){clearTimeout(tmr);cur=(cur+1)%songs.length;note=0;tElap=0;tStart=Date.now();updInfo();if(playing)playNote();};

  updInfo();
};

apps.clock=function(el){
  el.innerHTML=mkH('时钟',{bg:'#000'})+'<div class="ab"><div class="clock"><div class="cl-tabs"><div class="cl-tab on" data-t="clock">时钟</div><div class="cl-tab" data-t="stopwatch">秒表</div><div class="cl-tab" data-t="timer">计时器</div></div><div class="cl-body" id="clb"></div></div></div>';
  var tab='clock',interval=null;function switchTab(t){tab=t;el.querySelectorAll('.cl-tab').forEach(function(e){e.classList.toggle('on',e.dataset.t===t);});clearInterval(interval);renderTab();}
  el.querySelectorAll('.cl-tab').forEach(function(t){t.addEventListener('click',function(){switchTab(t.dataset.t);});});
  function renderTab(){var b=document.getElementById('clb');
    if(tab==='clock'){b.innerHTML='<div class="cl-face"><canvas id="clkcv" width="220" height="220"></canvas></div><div class="cl-dig" id="clkd"></div><div class="cl-sec" id="clks"></div>';drawClock();interval=setInterval(drawClock,1000);}
    else if(tab==='stopwatch'){var ms=0,running=false,laps=[];b.innerHTML='<div class="sw-display" id="swd">00:00.00</div><div class="sw-btns"><button class="sw-btn sw-lap" id="swl">计次</button><button class="sw-btn sw-start" id="sws">启动</button></div><div class="sw-laps" id="swlps"></div>';var sd=document.getElementById('swd');function uSw(){var s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);s%=60;sd.textContent=(h?String(h).padStart(2,'0')+':':'')+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(Math.floor(ms%1000/10)).padStart(2,'0');}
      document.getElementById('sws').onclick=function(){if(!running){running=true;var st=Date.now()-ms;interval=setInterval(function(){ms=Date.now()-st;uSw();},10);document.getElementById('sws').textContent='停止';document.getElementById('sws').className='sw-btn sw-stop';}else{running=false;clearInterval(interval);document.getElementById('sws').textContent='启动';document.getElementById('sws').className='sw-btn sw-start';}};
      document.getElementById('swl').onclick=function(){if(!running){ms=0;uSw();laps=[];document.getElementById('swlps').innerHTML='';return;}laps.push(ms);var lp=document.getElementById('swlps');var d=document.createElement('div');d.className='sw-lap-r';d.innerHTML='<span>计次 '+laps.length+'</span><span>'+sd.textContent+'</span>';lp.insertBefore(d,lp.firstChild);};}
    else if(tab==='timer'){var mins=5,running2=false,left=0;b.innerHTML='<div class="tmr-sel"><button class="tmr-btn" id="tmd">−</button><div class="tmr-val" id="tmv">5:00</div><button class="tmr-btn" id="tmu">+</button></div><button class="tmr-go" id="tmgo">启动</button>';
      document.getElementById('tmd').onclick=function(){if(!running2&&mins>1){mins--;document.getElementById('tmv').textContent=mins+':00';}};
      document.getElementById('tmu').onclick=function(){if(!running2&&mins<60){mins++;document.getElementById('tmv').textContent=mins+':00';}};
      document.getElementById('tmgo').onclick=function(){if(!running2){running2=true;left=mins*60;document.getElementById('tmgo').textContent='暂停';interval=setInterval(function(){left--;if(left<=0){clearInterval(interval);running2=false;document.getElementById('tmgo').textContent='启动';document.getElementById('tmv').textContent='0:00';return;}var m=Math.floor(left/60),s=left%60;document.getElementById('tmv').textContent=m+':'+String(s).padStart(2,'0');},1000);}else{running2=false;clearInterval(interval);document.getElementById('tmgo').textContent='继续';}};}}
  function drawClock(){var cv=document.getElementById('clkcv');if(!cv)return;var c=cv.getContext('2d'),w=220,h=220,cx=w/2,cy=h/2,r=95;c.clearRect(0,0,w,h);c.strokeStyle='rgba(255,255,255,.2)';c.lineWidth=2;c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.stroke();for(var i=0;i<12;i++){var a=i*Math.PI/6-Math.PI/2;c.strokeStyle=i%3===0?'#fff':'rgba(255,255,255,.4)';c.lineWidth=i%3===0?2.5:1;c.beginPath();c.moveTo(cx+Math.cos(a)*(r-10),cy+Math.sin(a)*(r-10));c.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);c.stroke();}var now=new Date(),hr=now.getHours()%12,mn=now.getMinutes(),sc=now.getSeconds();var ha=(hr+mn/60)*Math.PI/6-Math.PI/2,ma=(mn+sc/60)*Math.PI/6-Math.PI/2,sa=sc*Math.PI/6-Math.PI/2;c.lineCap='round';c.strokeStyle='#fff';c.lineWidth=4;c.beginPath();c.moveTo(cx,cy);c.lineTo(cx+Math.cos(ha)*50,cy+Math.sin(ha)*50);c.stroke();c.lineWidth=3;c.beginPath();c.moveTo(cx,cy);c.lineTo(cx+Math.cos(ma)*70,cy+Math.sin(ma)*70);c.stroke();c.strokeStyle='#ff9500';c.lineWidth=1.5;c.beginPath();c.moveTo(cx,cy);c.lineTo(cx+Math.cos(sa)*78,cy+Math.sin(sa)*78);c.stroke();c.fillStyle='#ff9500';c.beginPath();c.arc(cx,cy,3,0,Math.PI*2);c.fill();var d=document.getElementById('clkd');if(d)d.textContent=String(now.getHours()).padStart(2,'0')+':'+String(mn).padStart(2,'0');var ds=document.getElementById('clks');if(ds)ds.textContent=':'+String(sc).padStart(2,'0');}
  renderTab();
};

/* ═══════════ CALENDAR ═══════════ */
apps.calendar=function(el){
  var now=new Date(),year=now.getFullYear(),month=now.getMonth();
  function render(){var months=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    el.innerHTML=mkH('日历',{bg:'#000'})+'<div class="ab"><div class="cal"><div class="cal-hd"><button id="cp">‹</button><h2>'+year+'年 '+months[month]+'</h2><button id="cn">›</button></div><div class="cal-week"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div><div class="cal-grid" id="cag"></div><div class="cal-detail"><h3 id="cad-t"></h3><p id="cad-b"></p></div></div></div>';
    var grid=document.getElementById('cag');var first=new Date(year,month,1).getDay(),days=new Date(year,month+1,0).getDate(),prev=new Date(year,month,0).getDate();
    for(var i=first-1;i>=0;i--){var d=document.createElement('div');d.className='cal-day other';d.textContent=prev-i;grid.appendChild(d);}
    for(var i=1;i<=days;i++){var d=document.createElement('div');d.className='cal-day';if(i===now.getDate()&&month===now.getMonth()&&year===now.getFullYear())d.classList.add('today');d.textContent=i;(function(day){d.addEventListener('click',function(){var wd=['周日','周一','周二','周三','周四','周五','周六'];document.getElementById('cad-t').textContent=year+'年'+(month+1)+'月'+day+'日 '+wd[new Date(year,month,day).getDay()];var evts=['没有事件','团队会议 14:00','生日聚会','健身 18:00','电影之夜','阅读时间'];document.getElementById('cad-b').textContent=evts[day%evts.length]||'没有事件';});})(i);grid.appendChild(d);}
    var rem=42-first-days;for(var i=1;i<=rem;i++){var d=document.createElement('div');d.className='cal-day other';d.textContent=i;grid.appendChild(d);}
    document.getElementById('cp').onclick=function(){month--;if(month<0){month=11;year--;}render();};
    document.getElementById('cn').onclick=function(){month++;if(month>11){month=0;year++;}render();};
    document.getElementById('cad-t').textContent=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 今天';document.getElementById('cad-b').textContent='点击日期查看详情';
  }render();
};

apps.safari=function(el){
  var pages={apple:'<div style="background:#000;color:#f5f5f7;padding:40px 20px;text-align:center;min-height:100%"><h1 style="font-size:28px;margin-bottom:8px">macOS Desktop</h1><p style="color:#86868b;font-size:14px">纯 HTML/CSS/JS</p></div>'};
  function showStart(){el.innerHTML=mkH('Safari')+'<div class="ab"><div class="saf"><div class="saf-bar"><input id="surl" placeholder="搜索或输入网址"><button id="sgo">前往</button></div><div class="saf-content" id="sc"><div class="saf-start"><div class="saf-favs"><div class="saf-fav" data-p="apple"><div class="saf-fi" style="background:#333">🍎</div><span class="saf-fn">Apple</span></div></div></div></div></div></div>';el.querySelectorAll('[data-p]').forEach(function(e){e.addEventListener('click',function(){goPage(e.dataset.p);});});document.getElementById('sgo').onclick=function(){var v=document.getElementById('surl').value.trim();if(v)goPage(v);};document.getElementById('surl').addEventListener('keydown',function(e){if(e.key==='Enter')goPage(document.getElementById('surl').value.trim());});}
  function goPage(p){document.getElementById('surl').value=p;var sc=document.getElementById('sc');if(pages[p])sc.innerHTML=pages[p];else if(p){var u=p.match(/^https?:\/\//)?p:'https://'+p;sc.innerHTML='<iframe src="'+u+'" style="width:100%;height:100%;border:none"></iframe>';}document.querySelector('.back-btn').onclick=showStart;}
  showStart();
};

/* ═══════════ PHOTOS ═══════════ */
apps.photos=function(el){
  var photos=[];function gen(){var c=document.createElement('canvas');c.width=200;c.height=200;var x=c.getContext('2d');[{g:[0,'#ff6b6b','#ff1493']},{g:[1,'#0077be','#00d4ff']},{},{g:[0,'#2d5016','#87CEEB']},{},{},{},{g:[0,'#0f0c29','#302b63']},{},{},{g:[0,'#a8edea','#fed6e3']},{}].forEach(function(){x.clearRect(0,0,200,200);var g=x.createLinearGradient(0,0,200,200);g.addColorStop(0,'hsl('+Math.random()*360+',70%,50%)');g.addColorStop(1,'hsl('+Math.random()*360+',70%,40%)');x.fillStyle=g;x.fillRect(0,0,200,200);photos.push(c.toDataURL());});}
  gen();el.innerHTML=mkH('照片')+'<div class="ab"><div class="photos"><div class="p-grid" id="pg"></div></div></div>';
  var pg=document.getElementById('pg');photos.forEach(function(src,i){var d=document.createElement('div');d.className='p-item';var img=document.createElement('img');img.src=src;d.appendChild(img);d.onclick=function(){var lb=document.createElement('div');lb.className='p-lb show';lb.innerHTML='<button class="p-lb-close">×</button><button class="p-lb-nav pl">‹</button><img src="'+src+'" style="max-width:92%;max-height:70%;border-radius:8px"><button class="p-lb-nav pr">›</button><div class="p-lb-info">'+(i+1)+'/'+photos.length+'</div>';document.body.appendChild(lb);var idx=i;lb.querySelector('.p-lb-close').onclick=function(){lb.remove();};lb.addEventListener('click',function(e){if(e.target===lb)lb.remove();});lb.querySelector('.pl').onclick=function(e){e.stopPropagation();idx=(idx-1+photos.length)%photos.length;lb.querySelector('img').src=photos[idx];lb.querySelector('.p-lb-info').textContent=(idx+1)+'/'+photos.length;};lb.querySelector('.pr').onclick=function(e){e.stopPropagation();idx=(idx+1)%photos.length;lb.querySelector('img').src=photos[idx];lb.querySelector('.p-lb-info').textContent=(idx+1)+'/'+photos.length;};};pg.appendChild(d);});
};

apps.trash=function(el){
  var items=[{name:'旧文档.txt',icon:'📄',meta:'文稿 · 1月15日'},{name:'截屏.png',icon:'🖼️',meta:'图片 · 1月14日'},{name:'备份.zip',icon:'📦',meta:'压缩 · 1月13日'},{name:'笔记.md',icon:'📝',meta:'Markdown · 1月12日'},{name:'音乐.mp3',icon:'🎵',meta:'音频 · 1月11日'}];
  function render(){el.innerHTML=mkH('废纸篓',{right:'<button class="ah-btn" id="trcl">清空</button>'})+'<div class="ab"><div class="trash" id="trl"></div></div>';var trl=document.getElementById('trl');if(!items.length){trl.innerHTML='<div class="tr-empty">🗑️ 废纸篓为空</div>';return;}items.forEach(function(it,i){var d=document.createElement('div');d.className='tr-item';d.innerHTML='<span class="tr-icon">'+it.icon+'</span><div class="tr-info"><div class="tr-name">'+it.name+'</div><div class="tr-meta">'+it.meta+'</div></div>';d.onclick=function(){if(confirm('恢复 "'+it.name+'" ？')){items.splice(i,1);render();}};trl.appendChild(d);});document.getElementById('trcl').onclick=function(){if(items.length&&confirm('确定清倒？')){items=[];render();}};}
  render();
};
